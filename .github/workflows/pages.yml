name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - index.html
      - videos/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Montar site estático
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r videos _site/

      - name: Upload do artefacto Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar site
        id: deployment
        uses: actions/deploy-pages@v4
